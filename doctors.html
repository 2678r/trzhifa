<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>医生数据库 | 土耳其植发信息网</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { sand: '#f6f0e7', ink: '#1f1a14', clay: '#8b5e34', line: '#e4d8c8' },
            boxShadow: { soft: '0 20px 50px rgba(46, 31, 17, 0.08)' },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="doctors" class="bg-sand text-ink">
    <div class="min-h-screen">
      <header class="border-b border-stone-200/80 bg-white/80 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="/" class="flex flex-col">
            <span class="text-2xl font-semibold tracking-tight">土耳其植发信息网</span>
            <span class="text-xs uppercase tracking-[0.28em] text-stone-500">Doctors Database</span>
          </a>
          <nav class="hidden gap-6 text-sm text-stone-600 md:flex">
            <a href="/" class="nav-link">首页</a>
            <a href="/doctors.html" class="nav-link nav-link-active">医生库</a>
            <a href="/clinics.html" class="nav-link">诊所库</a>
            <a href="/guide.html" class="nav-link">自查指南</a>
            <a href="/submit.html" class="nav-link">提交信息</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-7xl px-4 pb-16 pt-10 sm:px-6 lg:px-8">
        <section class="rounded-[2rem] border border-stone-200 bg-white p-6 shadow-soft lg:p-10">
          <div class="inline-flex rounded-full border border-stone-200 bg-stone-50 px-3 py-1 text-xs uppercase tracking-[0.24em] text-stone-600">
            ISHRS 精品医生库
          </div>
          <h1 class="mt-5 text-4xl font-semibold tracking-tight text-stone-900 sm:text-5xl">14 位医生，重点看资质与专长。</h1>
          <p class="mt-5 max-w-4xl text-base leading-8 text-stone-600">
            这个页面数量不大，所以适合用卡片方式做清晰展示。你以后只需要维护 `data/doctors.json`，
            页面会自动读取 Fellow / Member / ABHRS / 专长 / 手术模型 / 备注 / 城市等字段。
          </p>
        </section>

        <section class="mt-8 rounded-[1.75rem] border border-stone-200 bg-white p-5 shadow-soft">
          <div class="grid gap-3 lg:grid-cols-[minmax(0,1.2fr)_repeat(3,minmax(160px,0.35fr))]">
            <input id="doctor-search" type="search" placeholder="搜索医生 / 专长 / 备注 / 城市" class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none transition focus:border-stone-400 focus:bg-white" />
            <select id="doctor-city" class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none transition focus:border-stone-400 focus:bg-white"></select>
            <select id="doctor-status" class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none transition focus:border-stone-400 focus:bg-white">
              <option value="all">全部级别</option>
              <option value="fellow">仅看 Fellow</option>
              <option value="member">仅看 Member</option>
              <option value="former_member">仅看前成员</option>
            </select>
            <select id="doctor-sort" class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none transition focus:border-stone-400 focus:bg-white">
              <option value="status">按资质排序</option>
              <option value="name">按姓名排序</option>
              <option value="city">按城市排序</option>
            </select>
          </div>
          <div class="mt-4 flex flex-wrap gap-3 text-sm text-stone-500">
            <span>当前显示 <strong id="doctor-count" class="text-stone-900">—</strong> 位医生</span>
            <span>数据来源：`data/doctors.json`</span>
          </div>
        </section>

        <section id="doctor-grid" class="mt-8 grid gap-5 md:grid-cols-2 xl:grid-cols-3"></section>
      </main>

      <footer class="border-t border-stone-200 bg-white">
        <div class="mx-auto max-w-7xl px-4 py-6 text-sm text-stone-500 sm:px-6 lg:px-8">
          以后固定维护：更新 `data/doctors.json` 即可。
        </div>
      </footer>
    </div>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
