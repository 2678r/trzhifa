<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>诊所数据库 | 土耳其植发信息网</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { sand: '#f6f0e7', ink: '#1f1a14', clay: '#8b5e34', line: '#e4d8c8' },
            boxShadow: { soft: '0 20px 50px rgba(46, 31, 17, 0.08)' },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="clinics" class="bg-sand text-ink">
    <div class="min-h-screen">
      <header class="border-b border-stone-200/80 bg-white/80 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="/" class="flex flex-col">
            <span class="text-2xl font-semibold tracking-tight">土耳其植发信息网</span>
            <span class="text-xs uppercase tracking-[0.28em] text-stone-500">Clinics Database</span>
          </a>
          <nav class="hidden gap-6 text-sm text-stone-600 md:flex">
            <a href="/" class="nav-link">首页</a>
            <a href="/doctors.html" class="nav-link">医生库</a>
            <a href="/clinics.html" class="nav-link nav-link-active">诊所库</a>
            <a href="/guide.html" class="nav-link">自查指南</a>
            <a href="/submit.html" class="nav-link">提交信息</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-[96rem] px-4 pb-16 pt-10 sm:px-6 lg:px-8">
        <section class="rounded-[2rem] border border-stone-200 bg-white p-6 shadow-soft lg:p-10">
          <div class="inline-flex rounded-full border border-stone-200 bg-stone-50 px-3 py-1 text-xs uppercase tracking-[0.24em] text-stone-600">
            合规机构数据库
          </div>
          <h1 class="mt-5 text-4xl font-semibold tracking-tight text-stone-900 sm:text-5xl">230 家诊所，重点做成宽表格数据库。</h1>
          <p class="mt-5 max-w-5xl text-base leading-8 text-stone-600">
            这个页面是网站的核心。你以后每两周只需要维护 `data/clinics.json`，
            前端会自动提供搜索、筛选、排序和全量列表展示。页面不再做分类卡片，而是以数据库表格为主。
          </p>
        </section>

        <section class="mt-8 rounded-[1.75rem] border border-stone-200 bg-white p-5 shadow-soft">
          <div class="grid gap-3 xl:grid-cols-[minmax(0,1.1fr)_repeat(4,minmax(160px,0.34fr))]">
            <input id="clinic-search" type="search" placeholder="搜索机构 / 医生 / 备注 / 官网 / clinic_id" class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none transition focus:border-stone-400 focus:bg-white" />
            <select id="clinic-type" class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none transition focus:border-stone-400 focus:bg-white"></select>
            <select id="clinic-structure" class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none transition focus:border-stone-400 focus:bg-white">
              <option value="all">全部结构</option>
              <option value="doctor_public">有医生 + package</option>
              <option value="doctor_private">有医生 + 需咨询</option>
              <option value="hospital">大型医院</option>
              <option value="other">其他</option>
            </select>
            <select id="clinic-pricing" class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none transition focus:border-stone-400 focus:bg-white">
              <option value="all">全部价格状态</option>
              <option value="public">仅看公开价格</option>
              <option value="private">仅看需咨询</option>
            </select>
            <select id="clinic-sort" class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none transition focus:border-stone-400 focus:bg-white">
              <option value="structure">按结构清晰度排序</option>
              <option value="name">按名称排序</option>
              <option value="recent">按核对时间排序</option>
            </select>
          </div>
          <div class="mt-4 flex flex-wrap gap-3 text-sm text-stone-500">
            <span>当前显示 <strong id="clinic-count" class="text-stone-900">—</strong> / <strong id="clinic-total" class="text-stone-900">—</strong> 家机构</span>
            <span>数据来源：`data/clinics.json`</span>
          </div>
        </section>

        <section class="mt-8 overflow-hidden rounded-[1.75rem] border border-stone-200 bg-white shadow-soft">
          <div class="overflow-auto">
            <table class="min-w-[1440px] border-collapse text-sm">
              <thead class="bg-stone-50 text-left text-xs uppercase tracking-[0.22em] text-stone-500">
                <tr>
                  <th class="sticky top-0 border-b border-stone-200 px-4 py-4">机构</th>
                  <th class="sticky top-0 border-b border-stone-200 px-4 py-4">类型</th>
                  <th class="sticky top-0 border-b border-stone-200 px-4 py-4">结构</th>
                  <th class="sticky top-0 border-b border-stone-200 px-4 py-4">医生</th>
                  <th class="sticky top-0 border-b border-stone-200 px-4 py-4">价格</th>
                  <th class="sticky top-0 border-b border-stone-200 px-4 py-4">备注</th>
                  <th class="sticky top-0 border-b border-stone-200 px-4 py-4">官网</th>
                  <th class="sticky top-0 border-b border-stone-200 px-4 py-4">核对</th>
                </tr>
              </thead>
              <tbody id="clinic-table-body"></tbody>
            </table>
          </div>
        </section>
      </main>

      <footer class="border-t border-stone-200 bg-white">
        <div class="mx-auto max-w-[96rem] px-4 py-6 text-sm text-stone-500 sm:px-6 lg:px-8">
          以后固定维护：更新 `data/clinics.json` 即可。
        </div>
      </footer>
    </div>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
